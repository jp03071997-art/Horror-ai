<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Horror AI Generator</title>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
padding:20px;
text-align:center;
}
textarea{
width:95%;
height:120px;
padding:10px;
border-radius:8px;
}
button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
background:red;
color:white;
border:none;
border-radius:8px;
}
pre{
margin-top:20px;
text-align:left;
white-space:pre-wrap;
background:#222;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>👻 Horror AI Generator</h1>

<textarea id="prompt" placeholder="Ghost in bedroom..."></textarea>

<br>

<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
async function generate(){

const prompt=document.getElementById("prompt").value;

document.getElementById("output").innerText="Generating...";

const res=await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
});

const data=await res.json();

document.getElementById("output").innerText=data.text || data.error;

}
</script>

</body>
</html>

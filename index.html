<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror AI Generator</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
margin-top:20px;
}
button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:8px;
background:red;
color:white;
font-size:18px;
cursor:pointer;
}
#result{
margin-top:30px;
white-space:pre-wrap;
text-align:left;
background:#222;
padding:20px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>👻 Horror AI Generator</h1>

<p>Apna Horror Prompt Likho</p>

<input id="prompt" placeholder="Ghost in bedroom">

<br>

<button onclick="generate()">
Generate
</button>

<div id="result"></div>

<script>

async function generate(){

const prompt=document.getElementById("prompt").value;

document.getElementById("result").innerHTML="Loading...";

const response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_OPENAI_API_KEY"
},

body:JSON.stringify({

model:"gpt-4.1-mini",

messages:[
{
role:"user",
content:"Create a cinematic horror video prompt in Hindi: "+prompt
}

]

})

});

const data=await response.json();

document.getElementById("result").innerHTML=data.choices[0].message.content;

}

</script>

</body>
</html>
